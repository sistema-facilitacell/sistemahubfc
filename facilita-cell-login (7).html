<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facilita Cell — Sistema Integrado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #FF6B00;
  --orange-dim: rgba(255,107,0,.18);
  --orange-glow: rgba(255,107,0,.35);
  --bg: #080809;
  --panel: #0e0e10;
  --border: rgba(255,107,0,.15);
  --text: #f0ede8;
  --muted: #666;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
}

.root {
  display: flex;
  width: 100vw;
  height: 100vh;
}

/* ═══ RIGHT — VISUAL ═══ */
.visual {
  flex: 1;
  height: 100vh;
  position: relative;
  overflow: hidden;
  background: #07080a;
}
.visual-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,107,0,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,107,0,.04) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridDrift 22s linear infinite;
}
@keyframes gridDrift {
  from { background-position: 0 0; }
  to   { background-position: 48px 48px; }
}
.visual-glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 680px; height: 680px;
  background: radial-gradient(circle, rgba(255,107,0,.11) 0%, transparent 65%);
  pointer-events: none;
  animation: pulse 4.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { transform: translate(-50%,-50%) scale(1); }
  50%      { transform: translate(-50%,-50%) scale(1.07); }
}
.visual-svg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.visual-svg svg {
  width: min(560px, 88%);
  height: auto;
  filter: drop-shadow(0 0 36px rgba(255,107,0,.18));
  animation: floatY 5.5s ease-in-out infinite;
}
@keyframes floatY {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-13px); }
}
.visual::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 110px; height: 100%;
  background: linear-gradient(to right, var(--panel) 0%, transparent 100%);
  z-index: 2;
  pointer-events: none;
}
.visual-label {
  position: absolute;
  bottom: 28px; right: 32px;
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,107,0,.35);
  z-index: 3;
}

/* ═══ LEFT — FORM ═══ */
.form-panel {
  flex-shrink: 0;
  width: 440px;
  height: 100vh;
  background: var(--panel);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 48px;
  position: relative;
  z-index: 4;
  box-shadow: 4px 0 60px rgba(0,0,0,.55);
}
.form-panel::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 200px; height: 200px;
  background: radial-gradient(circle at top right, rgba(255,107,0,.09) 0%, transparent 65%);
  pointer-events: none;
}
.form-panel::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 200px; height: 200px;
  background: radial-gradient(circle at bottom left, rgba(255,107,0,.06) 0%, transparent 65%);
  pointer-events: none;
}

/* brand */
.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 42px;
  animation: fadeUp .5s ease both;
}
.brand-icon {
  width: 46px; height: 46px;
  background: var(--orange-dim);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  color: var(--orange);
  flex-shrink: 0;
}
.brand-copy { line-height: 1.2; }
.brand-copy span { display: block; }
.b1 { font-size: 9.5px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
.b2 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; text-transform: uppercase; color: #fff; letter-spacing: .5px; }
.b3 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; text-transform: uppercase; color: var(--orange); letter-spacing: .5px; text-shadow: 0 0 18px var(--orange-glow); }

/* heading */
.heading { margin-bottom: 28px; animation: fadeUp .5s .1s ease both; }
.heading h1 { font-family: 'Syne', sans-serif; font-size: 29px; font-weight: 800; color: #fff; margin-bottom: 5px; }
.heading p  { font-size: 13.5px; color: var(--muted); }

/* divider */
.divider {
  width: 38px; height: 3px;
  background: var(--orange);
  border-radius: 2px;
  margin-bottom: 28px;
  box-shadow: 0 0 12px var(--orange-glow);
  animation: fadeUp .5s .15s ease both;
}

/* field */
.field { margin-bottom: 18px; animation: fadeUp .5s ease both; }
.field:nth-child(1) { animation-delay: .2s; }
.field:nth-child(2) { animation-delay: .26s; }
.field label { display: block; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin-bottom: 7px; }
.field-wrap {
  display: flex; align-items: center;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 12px;
  padding: 0 16px;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
.field-wrap:focus-within {
  border-color: var(--orange);
  background: rgba(255,107,0,.04);
  box-shadow: 0 0 0 3px rgba(255,107,0,.1);
}
.field-wrap .ico { color: var(--orange); display: flex; align-items: center; flex-shrink: 0; margin-right: 12px; opacity: .8; }
.field-wrap input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; padding: 14px 0;
}
.field-wrap input::placeholder { color: #2a2a2c; }
.eye { background: none; border: none; cursor: pointer; color: #333; display: flex; align-items: center; padding: 0; transition: color .2s; }
.eye:hover { color: var(--orange); }

/* forgot */
.forgot-row { display: flex; justify-content: flex-end; margin: -5px 0 24px; animation: fadeUp .5s .3s ease both; }
.forgot-row a { font-size: 12px; color: var(--orange); text-decoration: none; opacity: .8; transition: opacity .2s; }
.forgot-row a:hover { opacity: 1; text-decoration: underline; }

/* button */
.btn-login {
  width: 100%; height: 52px;
  background: linear-gradient(135deg, #FF6B00 0%, #FF9500 100%);
  border: none; border-radius: 12px;
  color: #000; font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 4px 28px rgba(255,107,0,.38), inset 0 1px 0 rgba(255,255,255,.12);
  transition: transform .16s, box-shadow .2s, filter .2s;
  animation: fadeUp .5s .35s ease both;
  position: relative; overflow: hidden;
}
.btn-login::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.14) 0%, transparent 55%);
  border-radius: 12px;
}
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(255,107,0,.52); filter: brightness(1.07); }
.btn-login:active { transform: scale(.98); }

/* error */
.err { display: none; margin-top: 12px; padding: 10px 14px; background: rgba(200,40,40,.08); border: 1px solid rgba(200,40,40,.2); border-radius: 9px; color: #f87; font-size: 12.5px; text-align: center; }
.err.on { display: block; }

/* footer */
.form-footer { margin-top: 32px; display: flex; align-items: center; gap: 8px; color: #2e2e30; font-size: 11px; animation: fadeUp .5s .4s ease both; }
.form-footer svg { color: rgba(255,107,0,.35); flex-shrink: 0; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 800px) {
  html,body { overflow: auto; }
  .root { flex-direction: column-reverse; height: auto; }
  .form-panel { width: 100%; height: auto; padding: 48px 28px 56px; }
  .visual { height: 260px; width: 100%; }
  .visual::before { width: 100%; height: 80px; top: auto; bottom: 0; background: linear-gradient(to top, var(--panel) 0%, transparent 100%); }
}
</style>
</head>
<body>
<div class="root">

  <!-- FORM -->
  <div class="form-panel">
    <div class="brand">
      <div class="brand-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" fill="currentColor" opacity=".2"/>
          <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand-copy">
        <span class="b1">Sistemas</span>
        <span class="b2">Integrado</span>
        <span class="b3">Facilita Cell</span>
      </div>
    </div>

    <div class="heading">
      <h1>Bem-vindo de volta</h1>
      <p>Acesse sua conta para continuar</p>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label for="fu">Usuário</label>
      <div class="field-wrap">
        <span class="ico">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </span>
        <input id="fu" type="text" placeholder="Digite seu usuário" autocomplete="username"/>
      </div>
    </div>

    <div class="field">
      <label for="fp">Senha</label>
      <div class="field-wrap">
        <span class="ico">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input id="fp" type="password" placeholder="Digite sua senha" autocomplete="current-password"/>
        <button class="eye" onclick="toggleEye(this)" aria-label="Ver senha">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot-row"><a href="#">Esqueci minha senha?</a></div>

    <button class="btn-login" onclick="doLogin()">Entrar no sistema</button>
    <div class="err" id="err">Usuário ou senha inválidos. Tente novamente.</div>

    <div class="form-footer">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Conexão segura · Facilita Cell © 2025
    </div>
  </div>

  <!-- VISUAL -->
  <div class="visual">
    <div class="visual-bg"></div>
    <div class="visual-glow"></div>
    <div class="visual-svg">
      <svg viewBox="0 0 560 480" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="cg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FF6B00" stop-opacity=".2"/>
            <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="ng" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1c1108"/>
            <stop offset="100%" stop-color="#0c0b0a"/>
          </radialGradient>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="sg" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="7" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- ambient glow -->
        <circle cx="280" cy="240" r="215" fill="url(#cg)"/>

        <!-- orbit rings -->
        <ellipse cx="280" cy="240" rx="198" ry="198" stroke="#FF6B00" stroke-width=".9" stroke-dasharray="6 6" opacity=".17"/>
        <ellipse cx="280" cy="240" rx="155" ry="155" stroke="#FF6B00" stroke-width=".6" stroke-dasharray="3 9" opacity=".11"/>

        <!-- ── connector lines ── -->
        <line x1="280" y1="190" x2="280" y2="100" stroke="#FF6B00" stroke-width="1.3" stroke-dasharray="5 4" opacity=".45"/>
        <line x1="332" y1="212" x2="408" y2="148" stroke="#FF6B00" stroke-width="1.3" stroke-dasharray="5 4" opacity=".45"/>
        <line x1="332" y1="240" x2="422" y2="240" stroke="#FF6B00" stroke-width="1.3" stroke-dasharray="5 4" opacity=".45"/>
        <line x1="318" y1="284" x2="394" y2="350" stroke="#FF6B00" stroke-width="1.3" stroke-dasharray="5 4" opacity=".45"/>
        <line x1="280" y1="292" x2="280" y2="376" stroke="#FF6B00" stroke-width="1.3" stroke-dasharray="5 4" opacity=".45"/>
        <line x1="242" y1="284" x2="166" y2="350" stroke="#FF6B00" stroke-width="1.3" stroke-dasharray="5 4" opacity=".45"/>
        <line x1="228" y1="240" x2="138" y2="240" stroke="#FF6B00" stroke-width="1.3" stroke-dasharray="5 4" opacity=".45"/>
        <line x1="248" y1="212" x2="152" y2="148" stroke="#FF6B00" stroke-width="1.3" stroke-dasharray="5 4" opacity=".45"/>

        <!-- endpoint dots -->
        <circle cx="280" cy="100" r="4.5" fill="#FF6B00" opacity=".75" filter="url(#glow)"/>
        <circle cx="422" cy="240" r="4.5" fill="#FF6B00" opacity=".75" filter="url(#glow)"/>
        <circle cx="138" cy="240" r="4.5" fill="#FF6B00" opacity=".75" filter="url(#glow)"/>
        <circle cx="280" cy="376" r="4.5" fill="#FF6B00" opacity=".75" filter="url(#glow)"/>

        <!-- ── CENTER HUB ── -->
        <rect x="228" y="188" width="104" height="104" rx="20" fill="#141209" stroke="#FF6B00" stroke-width="2" filter="url(#sg)"/>
        <rect x="232" y="192" width="96" height="96" rx="17" fill="url(#ng)"/>
        <text x="280" y="256" text-anchor="middle" font-family="'Syne',sans-serif" font-weight="800" font-size="44" fill="#FF6B00" filter="url(#glow)">S</text>

        <!-- ── MODULE CARDS (64×64 each) ── -->

        <!-- TOP: FINANCEIRO (248, 62) -->
        <g transform="translate(248,62)">
          <rect width="64" height="64" rx="14" fill="#141209" stroke="#FF6B00" stroke-width="1.5"/>
          <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#ng)" opacity=".95"/>
          <text x="32" y="17" text-anchor="middle" font-family="'Syne',sans-serif" font-size="7.5" font-weight="700" fill="#FF6B00" letter-spacing=".8" opacity=".9">GESTÃO</text>
          <rect x="13" y="34" width="8" height="16" rx="2" fill="#FF6B00" opacity=".45"/>
          <rect x="23" y="26" width="8" height="24" rx="2" fill="#FF6B00" opacity=".65"/>
          <rect x="33" y="30" width="8" height="20" rx="2" fill="#FF6B00" opacity=".55"/>
          <rect x="43" y="22" width="8" height="28" rx="2" fill="#FF6B00" opacity=".8"/>
          <text x="32" y="59" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="6.5" fill="#666">FINANCEIRA</text>
        </g>

        <!-- TOP-RIGHT: VENDAS (404, 116) -->
        <g transform="translate(404,116)">
          <rect width="64" height="64" rx="14" fill="#141209" stroke="#FF6B00" stroke-width="1.5"/>
          <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#ng)" opacity=".95"/>
          <text x="32" y="17" text-anchor="middle" font-family="'Syne',sans-serif" font-size="7.5" font-weight="700" fill="#FF6B00" letter-spacing=".8" opacity=".9">VENDAS</text>
          <circle cx="32" cy="35" r="9" stroke="#FF6B00" stroke-width="1.6" fill="none" opacity=".72"/>
          <path d="M18 52c0-4.6 6.3-8 14-8s14 3.4 14 8" stroke="#FF6B00" stroke-width="1.6" fill="none" opacity=".72"/>
          <text x="32" y="59" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="6.5" fill="#666">E CRM</text>
        </g>

        <!-- RIGHT: ESTOQUE (422, 208) -->
        <g transform="translate(422,208)">
          <rect width="64" height="64" rx="14" fill="#141209" stroke="#FF6B00" stroke-width="1.5"/>
          <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#ng)" opacity=".95"/>
          <text x="32" y="17" text-anchor="middle" font-family="'Syne',sans-serif" font-size="7.5" font-weight="700" fill="#FF6B00" letter-spacing=".8" opacity=".9">ESTOQUE</text>
          <path d="M16 30l16-9 16 9v16l-16 9-16-9V30z" stroke="#FF6B00" stroke-width="1.6" fill="none" opacity=".7"/>
          <line x1="16" y1="30" x2="32" y2="39" stroke="#FF6B00" stroke-width="1" opacity=".4"/>
          <line x1="48" y1="30" x2="32" y2="39" stroke="#FF6B00" stroke-width="1" opacity=".4"/>
          <line x1="32" y1="39" x2="32" y2="55" stroke="#FF6B00" stroke-width="1" opacity=".4"/>
          <text x="32" y="59" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="6.5" fill="#666">SUPRIMENTOS</text>
        </g>

        <!-- BOTTOM-RIGHT: FISCAL (394, 350) -->
        <g transform="translate(394,350)">
          <rect width="64" height="64" rx="14" fill="#141209" stroke="#FF6B00" stroke-width="1.5"/>
          <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#ng)" opacity=".95"/>
          <text x="32" y="17" text-anchor="middle" font-family="'Syne',sans-serif" font-size="7.5" font-weight="700" fill="#FF6B00" letter-spacing=".8" opacity=".9">FISCAL</text>
          <rect x="18" y="23" width="28" height="32" rx="4" stroke="#FF6B00" stroke-width="1.5" fill="none" opacity=".7"/>
          <line x1="24" y1="31" x2="40" y2="31" stroke="#FF6B00" stroke-width="1" opacity=".5"/>
          <line x1="24" y1="37" x2="40" y2="37" stroke="#FF6B00" stroke-width="1" opacity=".5"/>
          <line x1="24" y1="43" x2="34" y2="43" stroke="#FF6B00" stroke-width="1" opacity=".5"/>
          <text x="32" y="59" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="6.5" fill="#666">E CONTÁBIL</text>
        </g>

        <!-- BOTTOM: ANALYTICS (248, 376) -->
        <g transform="translate(248,376)">
          <rect width="64" height="64" rx="14" fill="#141209" stroke="#FF6B00" stroke-width="1.5"/>
          <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#ng)" opacity=".95"/>
          <text x="32" y="17" text-anchor="middle" font-family="'Syne',sans-serif" font-size="7.5" font-weight="700" fill="#FF6B00" letter-spacing=".8" opacity=".9">ANALYTICS</text>
          <circle cx="32" cy="38" r="14" fill="none" stroke="#FF6B00" stroke-width="1" opacity=".2"/>
          <path d="M32 24 A14 14 0 0 1 46 38 L32 38Z" fill="#FF6B00" opacity=".65"/>
          <path d="M32 38 A14 14 0 0 1 20 50 L32 38Z" fill="#FF6B00" opacity=".38"/>
          <path d="M32 38 A14 14 0 0 1 32 24 L32 38Z" fill="#FF6B00" opacity=".2"/>
          <text x="32" y="59" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="6.5" fill="#666">RELATÓRIOS</text>
        </g>

        <!-- BOTTOM-LEFT: RH (102, 350) -->
        <g transform="translate(102,350)">
          <rect width="64" height="64" rx="14" fill="#141209" stroke="#FF6B00" stroke-width="1.5"/>
          <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#ng)" opacity=".95"/>
          <text x="32" y="17" text-anchor="middle" font-family="'Syne',sans-serif" font-size="7.5" font-weight="700" fill="#FF6B00" letter-spacing=".8" opacity=".9">RECURSOS</text>
          <circle cx="22" cy="31" r="8" stroke="#FF6B00" stroke-width="1.5" fill="none" opacity=".65"/>
          <path d="M10 52c0-3.5 5.4-6 12-6" stroke="#FF6B00" stroke-width="1.5" fill="none" opacity=".65"/>
          <circle cx="42" cy="31" r="8" stroke="#FF6B00" stroke-width="1.5" fill="none" opacity=".4"/>
          <path d="M42 46c6.6 0 12 2.5 12 6" stroke="#FF6B00" stroke-width="1.5" fill="none" opacity=".4"/>
          <text x="32" y="59" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="6.5" fill="#666">HUMANOS</text>
        </g>

        <!-- LEFT: COMPRAS (74, 208) -->
        <g transform="translate(74,208)">
          <rect width="64" height="64" rx="14" fill="#141209" stroke="#FF6B00" stroke-width="1.5"/>

<script>
const CRED = { u: '03818244200', p: '218939' };
function doLogin() {
  const u = document.getElementById('fu').value.trim();
  const p = document.getElementById('fp').value.trim();
  const e = document.getElementById('err');
  if (u === CRED.u && p === CRED.p) {
    e.classList.remove('on');
    const btn = document.querySelector('.btn-login');
    btn.textContent = '✓ Acesso autorizado';
    btn.style.background = 'linear-gradient(135deg,#00c853,#00e676)';
  } else {
    e.classList.add('on');
    document.getElementById('fp').value = '';
  }
}
function toggleEye(btn) {
  const inp = document.getElementById('fp');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.style.color = show ? 'var(--orange)' : '';
}
document.getElementById('fu').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('fp').focus(); });
document.getElementById('fp').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
